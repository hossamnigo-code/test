  /* empty state */

  .about-strip {

let products = JSON.parse(localStorage.getItem('sillage_products') || 'null') || defaultProducts;
let nextId = Math.max(...products.map(p => p.id), 0) + 1;

function save() {
  localStorage.setItem('sillage_products', JSON.stringify(products));
}

// ── RENDER PRODUCTS ────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  if (!products.length) {
    grid.innerHTML = `<div class="empty-state">
      <span class="empty-state-icon">◌</span>
      <p>No products in the collection yet.<br>Add some via the Admin panel.</p>
    </div>`;
    return;
  }
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="product-img">
        <div class="product-img-placeholder">${p.icon}</div>
        ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
      </div>
      <div class="product-body">
        <div class="product-house">${escHtml(p.house)}</div>
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-notes">${escHtml(p.notes)}</div>
        <div class="product-footer">
          <span class="product-size">${p.size} sample</span>
          <span class="product-price"><span>€</span>${p.price.toFixed(2)}</span>
        </div>
        <button class="product-add" onclick="addToCart(${p.id})">Add to Cart</button>
      </div>`;
    grid.appendChild(card);
  });
}

// ── ADMIN PRODUCT LIST ─────────────────────────────────────────────────────
function renderAdminList() {
  const list = document.getElementById('adminProductList');
  list.innerHTML = '';
  if (!products.length) {
    list.innerHTML = '<p style="font-size:13px;color:var(--light-mid);padding:20px 0;">No products yet. Add some!</p>';
    return;
  }
  products.forEach(p => {
    const item = document.createElement('div');
    item.className = 'admin-product-item';
    item.id = `admin-item-${p.id}`;
    item.innerHTML = `
      <div class="admin-product-icon">${p.icon}</div>
      <div class="admin-product-info">
        <div class="admin-product-name">${escHtml(p.name)}</div>
        <div class="admin-product-house">${escHtml(p.house)} · ${p.size}</div>
      </div>
      <div class="admin-product-price">€${p.price.toFixed(2)}</div>
      <button class="admin-delete-btn" onclick="deleteProduct(${p.id})">Remove</button>`;
    list.appendChild(item);
  });
}

// ── CART ───────────────────────────────────────────────────────────────────
function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartBadge();
  showToast(`${p.name} added to cart`, 'success');
}

function updateCartBadge() {
  document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
}

function openCart() {
  const items = document.getElementById('cartItems');
  const total = document.getElementById('cartTotal');
  const btn = document.getElementById('checkoutBtn');

  if (!cart.length) {
    items.innerHTML = '<p style="font-size:13px;color:var(--light-mid);text-align:center;padding:32px 0;">Your cart is empty.</p>';
    total.textContent = '';
    btn.style.display = 'none';
  } else {
    items.innerHTML = cart.map(c => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--sand);">
        <div>
          <div style="font-size:13px;font-weight:500;">${escHtml(c.name)}</div>
          <div style="font-size:10px;color:var(--light-mid);letter-spacing:1px;margin-top:3px;">${c.size} · ×${c.qty}</div>
        </div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;">€${(c.price * c.qty).toFixed(2)}</div>
      </div>`).join('');
    const sum = cart.reduce((s, c) => s + c.price * c.qty, 0);
    total.innerHTML = `<span style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--light-mid);margin-right:12px;">Total</span>€${sum.toFixed(2)}`;
    btn.style.display = 'block';
  }
  document.getElementById('cartOverlay').classList.add('active');
}

function checkout() {
  closeOverlay('cartOverlay');
  cart = [];
  updateCartBadge();
  showToast('Order placed! Thank you ✦', 'success');
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function openLogin() {
  if (isLoggedIn) { openAdmin(); return; }
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginOverlay').classList.add('active');
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === CREDS.user && p === CREDS.pass) {
    isLoggedIn = true;
    closeOverlay('loginOverlay');
    openAdmin();
  } else {
    document.getElementById('loginError').textContent = 'Invalid credentials. Please try again.';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── ADMIN ──────────────────────────────────────────────────────────────────
function openAdmin() {
  renderAdminList();
  adminTab('products');
  document.getElementById('adminOverlay').classList.add('active');
}

function closeAdmin() {
  closeOverlay('adminOverlay');
}

function doLogout() {
  isLoggedIn = false;
  closeAdmin();
  showToast('Signed out');
}

function adminTab(tab) {
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.admin-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`admin-${tab}`).classList.add('active');
  event.currentTarget && event.currentTarget.classList.add('active');
  // fallback for non-event calls
  document.querySelectorAll('.admin-nav-item').forEach(n => {
    if (n.getAttribute('onclick') === `adminTab('${tab}')`) n.classList.add('active');
  });
}

function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  save();
  renderAdminList();
  renderProducts();
  showToast('Product removed', 'error');
}

function addProduct() {
  const house = document.getElementById('ap-house').value.trim();
  const name  = document.getElementById('ap-name').value.trim();
  const notes = document.getElementById('ap-notes').value.trim();
  const price = parseFloat(document.getElementById('ap-price').value);
  const size  = document.getElementById('ap-size').value;
  const badge = document.getElementById('ap-badge').value.trim();
  const icon  = document.getElementById('ap-icon').value;

  if (!house || !name || !price || price <= 0) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const prod = { id: nextId++, house, name, notes, price, size, badge, icon };
  products.push(prod);
  save();
  renderProducts();
  renderAdminList();

  // reset
  ['ap-house','ap-name','ap-notes','ap-price','ap-badge'].forEach(id => document.getElementById(id).value = '');

  showToast(`${name} added!`, 'success');
  adminTab('products');
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function closeOverlay(id) {
  document.getElementById(id).classList.remove('active');
}
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────
